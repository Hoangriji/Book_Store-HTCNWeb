<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả tìm kiếm - FiveH Book Store</title>
    <link rel="stylesheet" href="/shared/css/bootstrap.min.css">
    <link rel="stylesheet" href="/shared/css/components/header.css">
    <link rel="stylesheet" href="/shared/css/components/footer.css">
    <link rel="stylesheet" href="/shared/css/components/card.css">
    <link rel="stylesheet" href="searchPage.css">
    <!-- icon awesome free -->
    <script src="https://kit.fontawesome.com/81f80860c2.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- header -->
    <header class="inner-header"></header>

    <!-- main -->
    <div class="main py-5">
        <div class="container">
            <!-- search header (hiển thị từ khóa) -->
            <div class="search-header mb-5">
                <h1 id="searchTitle"></h1>
                <p id="resultCount" class="text-muted"></p>
            </div>

            <!-- results -->
            <div class="row g-4" id="searchResults">
                <!-- render content -->
            </div>

            <!-- if no results -->
            <div id="noResults" class="alert alert-info text-center py-5" style="display: none;">
                <i class="fa-solid fa-search fs-1 mb-3"></i>
                <h4>Không tìm thấy kết quả</h4>
                <p>Hãy thử với từ khóa khác</p>
                <a href="/" class="btn btn-primary mt-3">Quay lại trang chủ</a>
            </div>
        </div>
    </div>

    <!-- footer -->
    <footer class="inner-footer"></footer>

    <script type="module" src="/shared/js/main.js"></script>
    <script src="/shared/js/components/card.js"></script>
    <script src="searchPage.js"></script>
</body>
</html>
